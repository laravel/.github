name: normalize composer.json files

on:
  workflow_call:
    inputs:
      php:
        default: "8.4"
        type: string
      message:
        default: Normalize composer.json files
        type: string
      fix:
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ inputs.php }}
          tools: composer:v2, composer-normalize
          extensions: json, dom, curl, libxml, mbstring
          coverage: none

      - name: Normalize every composer.json file
        run: find . -path "*/vendor" -prune -o -name "composer.json" -print -exec composer normalize {} \;

      - name: Commit linted files
        if: ${{ inputs.fix }}
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: ${{ inputs.message }}
